<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Surprise</title>
  <style>
    body {
      margin: 0;
      text-align: center;
      background: #f5f5f5;
    }

    #container {
      position: relative;
      display: inline-block;
    }

    #mainImage {
      width: 100%;
      max-width: 600px;
    }

    #clickArea {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 120px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="container">
  <img id="mainImage" src="sorry.png">
  <div id="clickArea"></div>
</div>

<script>
  document.getElementById("clickArea").onclick = function() {
    document.getElementById("mainImage").src = "bob.png";
  };
</script>

</body>
</html>
